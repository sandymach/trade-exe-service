server:
  port: 8082

spring:
  application:
    name: trade-execution-service

#  datasource:
#    url: jdbc:mysql://database-1.c7me8euy81hb.eu-north-1.rds.amazonaws.com:3306/finadvdb
#    username: admin
#    password: Sandy*994
#    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432

      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

    consumer:
      group-id: trade-execution-group
      auto-offset-reset: earliest
      enable-auto-commit: false

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.fin.commo_event_lib.events.TradeRequestEvent

    listener:
      ack-mode: manual_immediate
      concurrency: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    com.fa.trade: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG

topics:
  trade-request: trade-requests
  trade-executed: trade-executed
  trade-rejected: trade-rejected